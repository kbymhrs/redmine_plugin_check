  redmine_plugin_check:
    column_help:
      status: "Overall result from the target version and detected signals: OK, Warning, Unknown, or Risky."
      primary_reasons: "Short list of the main reasons behind the OK, Warning, Unknown, or Risky status. '-' means there is no status reason important enough to surface here."
      identifier: "The plugin id registered with Redmine::Plugin.register."
      name: "The plugin display name. '-' means the name is missing or could not be read."
      version: "The plugin version. '-' means the version is missing or could not be read."
      latest_version: "When enabled, tries to detect a GitHub repository from plugin.url or .git/config, then fetches the latest Release or Tag via the GitHub API and GitHub tags page. '-' means the latest-version check has not been run. Rate limited means the unauthenticated GitHub API limit was reached and may clear after waiting. Private repositories, authentication, SSL errors, timeouts, or missing repositories may also prevent fetching."
      author: "The plugin author. '-' means the author is missing or could not be read."
      last_modified_at: "Latest file modification time inside the plugin directory, excluding paths such as .git, log, tmp, and vendor. '-' means no target file was found or the timestamp could not be read."
      requires_redmine: "The plugin's requires_redmine declaration. When a target version is entered, the table also shows whether that target satisfies the declaration. '-' means requires_redmine is missing or could not be read."
      requires_redmine_lower_bound_only: "Whether the declaration only states a lower bound, such as version_or_higher. Newer Redmine versions still need separate verification."
      target_major_jump: "Whether the target Redmine major version is newer than the current major version. For example, 3.3 to 6.x is Yes."
      redmine_condition_in_init: "Looks for Redmine version checks in init.rb, such as Redmine::VERSION, Redmine.version, or Gem::Version.new."
      has_migrations: "Whether the plugin has a db/migrate directory. Plugins with database changes need extra upgrade review."
      has_gemfile: "Whether the plugin has its own Gemfile. This can indicate gem version conflict risk with Redmine or other plugins."
      compatibility_findings: "Scans plugin source for old Rails/Redmine API patterns such as alias_method_chain, Dispatcher.to_prepare, and before_filter. When found, the table shows file path and line number. '-' means this scan did not find any matching pattern."
      notes: "Reasons and cautions behind the result, such as requires_redmine, legacy API patterns, or database migrations. '-' means there are no extra notes."
