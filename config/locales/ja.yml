  label_has_migrations: "db/migrate"
  label_has_gemfile: "Gemfile"
  label_compatibility_findings: "互換性 scan"
  label_export_csv: "CSV 出力"
  label_notes: "メモ"
  label_plugin_check_column_help: "項目の見方"
  label_plugin_check_help_column_name: "項目"
  label_plugin_check_help_column_description: "見ている内容"
  text_redmine_plugin_check_intro: "Redmine アップグレード前に、インストール済み plugin の互換性シグナルを読み取り専用で確認します。"
  redmine_plugin_check:
    column_help:
      status: "入力した移行先バージョンと検出結果から、OK / Warning / Unknown / Risky の総合判定を表示します。"
      identifier: "Redmine::Plugin.register で登録された plugin id です。"
      name: "plugin の表示名です。「-」は name が未設定または取得できないことを示します。"
      version: "plugin の version です。「-」は version が未設定または取得できないことを示します。"
      latest_version: "チェック時に plugin.url または .git/config から GitHub repository を探し、GitHub API で最新 Release または Tag を取得します。「-」は最新バージョン情報の取得チェックを実行していない状態です。private repository、認証が必要な repository、GitHub API に到達できない環境では取得できない場合があります。取得できない場合は「取得元なし」「取得不可」「取得失敗」と表示します。"
      author: "plugin の author です。「-」は author が未設定または取得できないことを示します。"
      last_modified_at: "plugin directory 内のファイル更新日時のうち、.git / log / tmp / vendor などを除いた最新日時です。「-」は対象ファイルがない、または更新日時を取得できないことを示します。"
      requires_redmine: "plugin の requires_redmine 指定です。移行先バージョンを入力している場合、条件を満たすかも括弧で表示します。「-」は requires_redmine が未指定または取得できないことを示します。"
      requires_redmine_lower_bound_only: "version_or_higher など、下限だけを示す指定かどうかです。新しい Redmine での動作確認は別途必要です。"
      target_major_jump: "現在の Redmine major version より、移行先 major version が新しいかどうかです。例: 3.3 から 6.x は「はい」になります。"
      redmine_condition_in_init: "init.rb 内に Redmine::VERSION、Redmine.version、Gem::Version.new など、Redmine バージョン分岐らしき記述があるかを見ます。"
      has_migrations: "plugin に db/migrate directory があるかを見ます。DB変更を伴う plugin はアップグレード時に確認が必要です。"
      has_gemfile: "plugin 独自の Gemfile があるかを見ます。Redmine 本体や他 plugin との gem version 衝突に注意します。"
      compatibility_findings: "plugin source から alias_method_chain、Dispatcher.to_prepare、before_filter など、古い Rails/Redmine API pattern を探します。「-」はこの scan で該当 pattern が見つからなかったことを示します。"
      notes: "判定理由や注意点です。requires_redmine、旧 API pattern、DB migration などの注意点をまとめて表示します。「-」は追加の注意メモがないことを示します。"
    latest_version_errors:
      source_missing: "取得元なし"
      version_unavailable: "取得不可"
      request_failed: "取得失敗"
    findings:
      alias_method_chain: "alias_method_chain"
      dispatcher_to_prepare: "Dispatcher.to_prepare"
      require_dispatcher: "require_dependency dispatcher"
      before_filter: "before_filter / after_filter"
      unloadable: "unloadable"
      attr_accessible: "attr_accessible"
      active_record_observer: "ActiveRecord::Observer"
      monkey_patch_include: "send(:include) による monkey patch"
    notes:
      requires_redmine_missing: "requires_redmine がありません"
      target_version_outside_requires_redmine: "移行先バージョンが requires_redmine の範囲外です"
      requires_redmine_lower_bound_only: "requires_redmine は下限指定です。新しい Redmine での動作確認は別途必要です"
      legacy_compatibility_patterns_detected: "古い Rails/Redmine 互換パターンを検出しました"
      legacy_breaking_patterns_detected: "移行先で壊れる可能性がある古いパターンを検出しました"
      init_contains_redmine_version_condition: "init.rb に Redmine バージョン条件らしき記述があります"
      has_database_migrations: "db/migrate があります"
      has_plugin_gemfile: "プラグイン独自の Gemfile があります"
      target_version_missing: "移行先 Redmine バージョンが未入力です"
